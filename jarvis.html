<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis — AI Voice Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --panel: #0b1117;
      --border: #1a2a3a;
      --blue: #00aaff;
      --blue-dim: #005580;
      --green: #00ffaa;
      --green-dim: #004433;
      --amber: #ffaa00;
      --purple: #aa55ff;
      --red: #ff4444;
      --text: #c8dce8;
      --text-dim: #4a6070;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Exo 2', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* scan line effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,170,255,0.015) 2px, rgba(0,170,255,0.015) 4px);
      pointer-events: none;
      z-index: 999;
    }

    header {
      width: 100%;
      max-width: 760px;
      padding: 2rem 2rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: var(--mono);
      font-size: 22px;
      letter-spacing: 8px;
      color: var(--blue);
      text-transform: uppercase;
    }

    .logo span { color: var(--text-dim); font-size: 11px; letter-spacing: 2px; display: block; margin-top: 2px; }

    .status-bar {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
    }

    .status-bar .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 5px;
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    main {
      width: 100%;
      max-width: 760px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ORB */
    .orb-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 2rem 0;
    }

    .orb-outer {
      position: relative;
      width: 140px; height: 140px;
      cursor: pointer;
    }

    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--blue-dim);
      animation: spin 8s linear infinite;
    }

    .orb-ring:nth-child(1) { inset: 0; }
    .orb-ring:nth-child(2) { inset: 8px; border-color: var(--blue-dim); animation-duration: 12s; animation-direction: reverse; }
    .orb-ring:nth-child(3) { inset: 16px; border-color: rgba(0,170,255,0.15); animation-duration: 6s; }

    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .orb-core {
      position: absolute;
      inset: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #0d2035, #060a0f);
      border: 1.5px solid var(--blue-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .orb-core svg { width: 32px; height: 32px; stroke: var(--blue); fill: none; stroke-width: 1.5; transition: stroke 0.3s; }

    .orb-outer:hover .orb-core { border-color: var(--blue); box-shadow: 0 0 20px rgba(0,170,255,0.3); }

    /* orb states */
    .orb-outer.wake .orb-ring { border-color: var(--blue); }
    .orb-outer.wake .orb-core { border-color: var(--blue); box-shadow: 0 0 30px rgba(0,170,255,0.4); }
    .orb-outer.wake .orb-core svg { stroke: var(--blue); }

    .orb-outer.active .orb-ring { border-color: var(--green); }
    .orb-outer.active .orb-core { border-color: var(--green); box-shadow: 0 0 30px rgba(0,255,170,0.4); }
    .orb-outer.active .orb-core svg { stroke: var(--green); }

    .orb-outer.thinking .orb-ring { border-color: var(--amber); animation-duration: 2s !important; }
    .orb-outer.thinking .orb-core { border-color: var(--amber); box-shadow: 0 0 30px rgba(255,170,0,0.3); }
    .orb-outer.thinking .orb-core svg { stroke: var(--amber); }

    .orb-outer.speaking .orb-ring { border-color: var(--purple); }
    .orb-outer.speaking .orb-core { border-color: var(--purple); box-shadow: 0 0 30px rgba(170,85,255,0.4); }
    .orb-outer.speaking .orb-core svg { stroke: var(--purple); }

    .state-text {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--blue);
      letter-spacing: 2px;
      text-transform: uppercase;
      min-height: 20px;
      text-align: center;
    }

    .state-text.wake { color: var(--blue); }
    .state-text.active { color: var(--green); }
    .state-text.thinking { color: var(--amber); }
    .state-text.speaking { color: var(--purple); }

    /* legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .leg-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* CONFIG PANEL */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--blue-dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .config-field label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }

    .config-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .config-field input:focus { border-color: var(--blue-dim); }
    .config-field input::placeholder { color: var(--text-dim); }

    /* QUICK COMMANDS */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
    }

    .chip:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(0,170,255,0.05);
    }

    /* LOG */
    .log {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      min-height: 200px;
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-log {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 2rem 0;
      letter-spacing: 1px;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; }

    .msg-tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
      white-space: nowrap;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .msg-tag.user { background: rgba(0,170,255,0.1); color: var(--blue); border: 1px solid rgba(0,170,255,0.2); }
    .msg-tag.jarvis { background: rgba(0,255,170,0.1); color: var(--green); border: 1px solid rgba(0,255,170,0.2); }
    .msg-tag.sys { background: rgba(74,96,112,0.2); color: var(--text-dim); border: 1px solid var(--border); }

    .msg-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      font-weight: 300;
      flex: 1;
    }

    /* MANUAL INPUT */
    .manual-row {
      display: flex;
      gap: 8px;
    }

    .manual-row input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 9px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .manual-row input:focus { border-color: var(--blue-dim); }
    .manual-row input::placeholder { color: var(--text-dim); }

    .btn {
      background: transparent;
      border: 1px solid var(--blue-dim);
      border-radius: 3px;
      padding: 9px 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--blue);
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn:hover {
      background: rgba(0,170,255,0.1);
      border-color: var(--blue);
    }

    .btn:active { transform: scale(0.97); }

    .btn-start {
      border-color: var(--green-dim);
      color: var(--green);
    }

    .btn-start:hover {
      background: rgba(0,255,170,0.08);
      border-color: var(--green);
    }

    footer {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      padding: 1rem 2rem 2rem;
      letter-spacing: 1px;
    }

    @media (max-width: 500px) {
      .config-grid { grid-template-columns: 1fr; }
      .orb-outer { width: 110px; height: 110px; }
      .orb-core { inset: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    JARVIS
    <span>Just A Rather Very Intelligent System</span>
  </div>
  <div class="status-bar">
    <span class="dot"></span> ONLINE<br>
    <span id="clock">--:--:--</span>
  </div>
</header>

<main>

  <!-- ORB -->
  <div class="orb-section">
    <div class="orb-outer idle" id="orb" onclick="toggleListen()" title="Click to start/stop listening">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-core">
        <!-- mic icon -->
        <svg viewBox="0 0 24 24" id="orb-svg">
          <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10a7 7 0 0 1-14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </div>
    </div>
    <div class="state-text idle" id="state-text">CLICK TO ACTIVATE</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#00aaff"></div>LISTENING (WAKE)</div>
      <div class="leg"><div class="leg-dot" style="background:#00ffaa"></div>LISTENING (CMD)</div>
      <div class="leg"><div class="leg-dot" style="background:#ffaa00"></div>THINKING</div>
      <div class="leg"><div class="leg-dot" style="background:#aa55ff"></div>SPEAKING</div>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="panel">
    <div class="panel-title">// Configuration</div>
    <div class="config-grid">
      <div class="config-field">
        <label>Claude API Key (optional)</label>
        <input type="password" id="api-key" placeholder="sk-ant-... (uses built-in if blank)" />
      </div>
      <div class="config-field">
        <label>News API Key (newsapi.org)</label>
        <input type="password" id="news-key" placeholder="Get free key at newsapi.org" />
      </div>
    </div>
  </div>

  <!-- QUICK COMMANDS -->
  <div class="panel">
    <div class="panel-title">// Quick Commands</div>
    <div class="chips">
      <button class="chip" onclick="runCommand('open google')">open google</button>
      <button class="chip" onclick="runCommand('open youtube')">open youtube</button>
      <button class="chip" onclick="runCommand('open github')">open github</button>
      <button class="chip" onclick="runCommand('open linkedin')">open linkedin</button>
      <button class="chip" onclick="runCommand('open twitter')">open twitter</button>
      <button class="chip" onclick="runCommand('what time is it')">what time is it</button>
      <button class="chip" onclick="runCommand('what is the date today')">today\'s date</button>
      <button class="chip" onclick="runCommand('news')">top news</button>
      <button class="chip" onclick="runCommand('tell me a joke')">tell me a joke</button>
      <button class="chip" onclick="runCommand('what is the weather like today')">weather</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="panel">
    <div class="panel-title">// Conversation Log</div>
    <div class="log" id="log">
      <div class="empty-log" id="empty-log">[ NO CONVERSATION YET ]</div>
    </div>
  </div>

  <!-- MANUAL INPUT -->
  <div class="manual-row">
    <input type="text" id="manual-input" placeholder="Or type a command and press Enter..." onkeydown="if(event.key==='Enter') sendManual()" />
    <button class="btn" onclick="sendManual()">SEND</button>
    <button class="btn btn-start" id="toggle-btn" onclick="toggleListen()">START</button>
  </div>

</main>

<footer>JARVIS v2.0 &nbsp;·&nbsp; Web Speech API + Claude AI &nbsp;·&nbsp; Works best in Chrome</footer>

<script>
  // ── Clock ──────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-IN', { hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── State ──────────────────────────────────────────────────────────────
  const SITES = {
    google: 'https://google.com',
    youtube: 'https://youtube.com',
    facebook: 'https://facebook.com',
    linkedin: 'https://linkedin.com',
    twitter: 'https://twitter.com',
    github: 'https://github.com',
    instagram: 'https://instagram.com',
    reddit: 'https://reddit.com',
    netflix: 'https://netflix.com',
    amazon: 'https://amazon.in',
  };

  let recognition = null;
  let listening = false;
  let awaitingCommand = false;

  // ── UI Helpers ─────────────────────────────────────────────────────────
  const orbEl = document.getElementById('orb');
  const stateEl = document.getElementById('state-text');
  const toggleBtn = document.getElementById('toggle-btn');

  const ORB_ICONS = {
    mic: `<path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/>`,
    brain: `<ellipse cx="12" cy="5" rx="3" ry="3"/><path d="M3 10h18M3 14h18"/><ellipse cx="12" cy="19" rx="3" ry="3"/><path d="M12 2v3M12 19v3M3 10a6 6 0 0 1 9-5.2M21 10a6 6 0 0 0-9-5.2M3 14a6 6 0 0 0 9 5.2M21 14a6 6 0 0 1-9 5.2"/>`,
    volume: `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>`,
    ear: `<path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 13a3.5 3.5 0 0 1-7 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 1 0 4"/>`,
  };

  function setOrbSvg(type) {
    document.getElementById('orb-svg').innerHTML = ORB_ICONS[type] || ORB_ICONS.mic;
  }

  function setOrb(state, label) {
    orbEl.className = 'orb-outer ' + state;
    stateEl.className = 'state-text ' + state;
    stateEl.textContent = label;
    if (state === 'wake') setOrbSvg('ear');
    else if (state === 'active') setOrbSvg('ear');
    else if (state === 'thinking') setOrbSvg('brain');
    else if (state === 'speaking') setOrbSvg('volume');
    else setOrbSvg('mic');
  }

  function addMsg(who, text, type) {
    const empty = document.getElementById('empty-log');
    if (empty) empty.remove();
    const log = document.getElementById('log');
    const d = document.createElement('div');
    d.className = 'msg';
    d.innerHTML = `<span class="msg-tag ${type}">${who}</span><span class="msg-text">${text}</span>`;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  // ── Speech Synthesis ───────────────────────────────────────────────────
  function speak(text) {
    return new Promise(resolve => {
      if (!window.speechSynthesis) { resolve(); return; }
      speechSynthesis.cancel();
      setOrb('speaking', 'SPEAKING...');
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-IN';
      utt.rate = 0.95;
      utt.pitch = 0.9;

      // try to pick an Indian/male voice if available
      const voices = speechSynthesis.getVoices();
      const prefer = voices.find(v => v.lang === 'en-IN') ||
                     voices.find(v => v.lang.startsWith('en'));
      if (prefer) utt.voice = prefer;

      utt.onend = resolve;
      utt.onerror = resolve;
      speechSynthesis.speak(utt);
    });
  }

  // ── Command Processor ──────────────────────────────────────────────────
  async function processCommand(cmd) {
    addMsg('YOU', cmd, 'user');
    const c = cmd.toLowerCase().trim();

    // open website
    for (const [name, url] of Object.entries(SITES)) {
      if (c.includes('open ' + name)) {
        addMsg('JARVIS', 'Opening ' + name + ', sir.', 'jarvis');
        await speak('Opening ' + name + ', sir.');
        window.open(url, '_blank');
        return;
      }
    }

    // play song
    if (c.startsWith('play ')) {
      const song = cmd.slice(5).trim();
      const url = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(song);
      addMsg('JARVIS', 'Playing ' + song + ' on YouTube.', 'jarvis');
      await speak('Playing ' + song + ' on YouTube.');
      window.open(url, '_blank');
      return;
    }

    // news
    if (c.includes('news')) {
      const newsKey = document.getElementById('news-key').value.trim();
      if (!newsKey) {
        addMsg('JARVIS', 'Please enter a News API key in the configuration panel. You can get a free key at newsapi.org.', 'jarvis');
        await speak('Please enter a News API key in the configuration panel.');
        return;
      }
      setOrb('thinking', 'FETCHING NEWS...');
      try {
        const r = await fetch(`https://newsapi.org/v2/top-headlines?country=in&apiKey=${newsKey}`);
        const data = await r.json();
        const articles = (data.articles || []).slice(0, 5);
        if (!articles.length) {
          addMsg('JARVIS', 'No news articles found.', 'jarvis');
          await speak('No news articles found.');
          return;
        }
        addMsg('JARVIS', 'Here are today\'s top headlines:', 'jarvis');
        await speak('Here are today\'s top headlines.');
        for (const a of articles) {
          addMsg('JARVIS', a.title, 'jarvis');
          await speak(a.title);
          await new Promise(r => setTimeout(r, 300));
        }
      } catch (e) {
        addMsg('JARVIS', 'Failed to fetch news. Check your API key.', 'jarvis');
        await speak('Failed to fetch news. Please check your API key.');
      }
      return;
    }

    // time
    if (c.includes('time')) {
      const t = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      const reply = 'The current time is ' + t + ', sir.';
      addMsg('JARVIS', reply, 'jarvis');
      await speak(reply);
      return;
    }

    // date
    if (c.includes('date') || c.includes('today')) {
      const d = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const reply = 'Today is ' + d + '.';
      addMsg('JARVIS', reply, 'jarvis');
      await speak(reply);
      return;
    }

    // fallback to Claude AI
    await callClaude(cmd);
  }

  // ── Claude API ─────────────────────────────────────────────────────────
  async function callClaude(cmd) {
    setOrb('thinking', 'THINKING...');
    // placeholder message
    addMsg('JARVIS', '...', 'jarvis');
    const lastMsg = document.getElementById('log').lastChild.querySelector('.msg-text');

    try {
      const apiKey = document.getElementById('api-key').value.trim();
      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) headers['x-api-key'] = apiKey;

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are a voice assistant named Jarvis, modelled after the AI from Iron Man. Be concise, helpful, and slightly formal. Respond in 1-3 sentences. No markdown, no bullet points — plain spoken English only.',
          messages: [{ role: 'user', content: cmd }]
        })
      });

      const data = await resp.json();
      const text = data.content?.[0]?.text || 'I\'m afraid I could not process that request, sir.';
      lastMsg.textContent = text;
      await speak(text);
    } catch (e) {
      const err = 'I encountered an error processing your request, sir.';
      lastMsg.textContent = err;
      await speak(err);
    }
  }

  // ── Speech Recognition ─────────────────────────────────────────────────
  function setupRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      addMsg('SYS', 'Speech recognition is not supported in this browser. Please use Chrome.', 'sys');
      return null;
    }
    const r = new SR();
    r.continuous = false;
    r.interimResults = false;
    r.lang = 'en-IN';

    r.onresult = async (e) => {
      const word = e.results[0][0].transcript.trim();

      if (!awaitingCommand) {
        // waiting for wake word
        if (word.toLowerCase().includes('jarvis')) {
          awaitingCommand = true;
          addMsg('SYS', 'Wake word detected.', 'sys');
          setOrb('active', 'LISTENING FOR COMMAND...');
          await speak('Yes sir, how can I help you?');
          if (listening) { try { r.start(); } catch(_) {} }
        } else {
          if (listening) { try { r.start(); } catch(_) {} }
        }
      } else {
        // got the command
        awaitingCommand = false;
        await processCommand(word);
        if (listening) {
          setOrb('wake', 'LISTENING FOR "JARVIS"...');
          try { r.start(); } catch(_) {}
        } else {
          setOrb('idle', 'CLICK TO ACTIVATE');
        }
      }
    };

    r.onerror = (e) => {
      if (e.error === 'no-speech' && listening) {
        try { r.start(); } catch(_) {}
      }
    };

    r.onend = () => {
      if (listening) {
        try { r.start(); } catch(_) {}
      }
    };

    return r;
  }

  function toggleListen() {
    if (!listening) {
      recognition = setupRecognition();
      if (!recognition) return;
      listening = true;
      awaitingCommand = false;
      setOrb('wake', 'LISTENING FOR "JARVIS"...');
      recognition.start();
      toggleBtn.textContent = 'STOP';
      addMsg('SYS', 'Listening started. Say "Jarvis" to activate.', 'sys');
    } else {
      listening = false;
      awaitingCommand = false;
      try { recognition.stop(); } catch(_) {}
      recognition = null;
      setOrb('idle', 'CLICK TO ACTIVATE');
      toggleBtn.textContent = 'START';
      addMsg('SYS', 'Listening stopped.', 'sys');
    }
  }

  function runCommand(cmd) { processCommand(cmd); }

  function sendManual() {
    const inp = document.getElementById('manual-input');
    const val = inp.value.trim();
    if (!val) return;
    inp.value = '';
    processCommand(val);
  }

  // preload voices
  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }

  addMsg('SYS', 'JARVIS initialized. Click START or the orb to begin voice detection.', 'sys');
</script>
</body>
</html>
